<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 520" role="img" aria-labelledby="title desc">
  <title id="title">Analise temporal das metricas</title>
  <desc id="desc">Grafico mensal de FA e Bias dos tres fornecedores entre fevereiro de 2017 e junho de 2018.</desc>
  <rect width="920" height="520" fill="#ffffff"/>
  <text x="52" y="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#172033">Consistencia ao longo do tempo</text>
  <text x="52" y="72" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#667085">Um fornecedor bom precisa manter desempenho mes a mes, nao apenas vencer no acumulado.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#475467">
    <rect x="600" y="32" width="14" height="14" rx="3" fill="#2f80ed"/><text x="622" y="44">Forn. 01</text>
    <rect x="690" y="32" width="14" height="14" rx="3" fill="#f59e0b"/><text x="712" y="44">Forn. 02</text>
    <rect x="780" y="32" width="14" height="14" rx="3" fill="#12b76a"/><text x="802" y="44">Forn. 03</text>
  </g>

  <text x="70" y="104" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="800" fill="#172033">FA mensal (quanto maior, melhor)</text>
  <g stroke="#eaecf0" stroke-width="1">
    <line x1="90" y1="300" x2="830" y2="300"/>
    <line x1="90" y1="247" x2="830" y2="247"/>
    <line x1="90" y1="194" x2="830" y2="194"/>
    <line x1="90" y1="141" x2="830" y2="141"/>
